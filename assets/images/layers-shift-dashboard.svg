<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 690" role="img" aria-labelledby="title desc">
  <title id="title">Layers Shift dashboard</title>
  <desc id="desc">A dark desktop interface with Excel data, layer mapping, preview, and export queue.</desc>
  <defs>
    <linearGradient id="frame" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#222734"/><stop offset="1" stop-color="#080A0F"/></linearGradient>
    <linearGradient id="blue" x1="0" x2="1"><stop stop-color="#4F8CFF"/><stop offset="1" stop-color="#00E5FF"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="30" stdDeviation="28" flood-color="#000" flood-opacity=".55"/></filter>
  </defs>
  <rect width="980" height="690" rx="34" fill="url(#frame)" filter="url(#shadow)"/>
  <rect x="22" y="22" width="936" height="646" rx="24" fill="#0C1017" stroke="rgba(255,255,255,.16)"/>
  <circle cx="58" cy="54" r="7" fill="#FF5C7A"/><circle cx="82" cy="54" r="7" fill="#FFD166"/><circle cx="106" cy="54" r="7" fill="#4DFFB5"/>
